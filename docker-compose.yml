# Paths are relative to this file: ./vault = markdown space, ./db = SQLite (users/ACL).
# To run only a pre-loaded image on a server without the repo, remove the "build:" block.
services:
  silverbullet:
    build:
      context: .
      dockerfile: Dockerfile
    image: silverbullet:latest
    restart: unless-stopped
    environment:
      SB_HOSTNAME: 0.0.0.0
      SB_FOLDER: /space
      SB_PORT: "3000"
      SB_DB_PATH: /data/silverbullet.db
      SB_ALLOW_INSECURE_HTTP: "1"
    volumes:
      - ./vault:/space
      - ./db:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - silverbullet
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN:-copters-app1.rnd}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config

  haproxy:
    image: haproxy:2.9
    restart: unless-stopped
    depends_on:
      - caddy
    ports:
      - "${HTTPS_PUBLISH_PORT:-9009}:9009"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
