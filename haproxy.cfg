global
    log stdout format raw local0

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend fe_9009
    bind *:9009
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend be_tls if { req.ssl_hello_type 1 }
    default_backend be_http_redirect

backend be_tls
    mode tcp
    server caddy_tls caddy:443 check

backend be_http_redirect
    mode tcp
    server caddy_http caddy:80 check
